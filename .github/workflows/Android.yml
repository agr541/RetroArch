name: CI Android

on:
  push:
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [run_build]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v7

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17

    - name: Restore keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" \
        | tr -d '\n\r ' \
        | base64 -d > pkg/android/release.keystore

    - name: Verify keystore
      run: |
        keytool -list -keystore pkg/android/release.keystore \
        -storepass "${{ secrets.KEYSTORE_PASSWORD }}"

    - name: Restore Play service account
      run: |
        cd pkg/android/phoenix
        echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > play-service-account.json


    - name: Upload to Play Internal Testing
      continue-on-error: true
      run: |
        cd pkg/android/phoenix
        ./gradlew publishPlayStoreNormalReleaseBundle \
          -Pandroid.injected.signing.store.file=../release.keystore \
          -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
          -PSERVICE_ACCOUNT_FILE="play-service-account.json"


    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - uses: actions/upload-artifact@v7
      with:
        name: retroarch-play-${{ steps.slug.outputs.sha8 }}
        path: |
          pkg/android/phoenix/build/outputs/bundle/**/*.aab
